<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proyecto — Camilo Novillo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  
  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  
  <!-- Lenis Smooth Scroll -->
  <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #E8E4DF;
      --bg-dark: #1a1a1a;
      --dark: #1a1a1a;
      --text: #2a2a2a;
      --text-light: #666;
      --accent: #1a1a1a;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }

    html {
      font-size: 16px;
    }

    html.lenis, html.lenis body {
      height: auto;
    }

    .lenis.lenis-smooth {
      scroll-behavior: auto !important;
    }

    .lenis.lenis-smooth [data-lenis-prevent] {
      overscroll-behavior: contain;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--dark);
      overflow-x: hidden;
      cursor: none;
    }

    /* ═══════════════════════════════════════════
       PRELOADER
    ═══════════════════════════════════════════ */
    .preloader {
      position: fixed;
      inset: 0;
      background: var(--bg-dark);
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 2rem;
    }

    .preloader-text {
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }

    .preloader-bar {
      width: 200px;
      height: 1px;
      background: rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }

    .preloader-progress {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 0;
      background: rgba(255,255,255,0.6);
    }

    /* ═══════════════════════════════════════════
       CURSOR
    ═══════════════════════════════════════════ */
    .cursor {
      position: fixed;
      width: 12px;
      height: 12px;
      background: var(--dark);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      mix-blend-mode: difference;
      transform: translate(-50%, -50%);
    }

    .cursor-follower {
      position: fixed;
      width: 40px;
      height: 40px;
      border: 1px solid var(--dark);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      opacity: 0.3;
      transform: translate(-50%, -50%);
      transition: width 0.3s var(--ease-out), height 0.3s var(--ease-out), opacity 0.3s;
    }

    .cursor-follower.hover {
      width: 60px;
      height: 60px;
      opacity: 0.5;
    }

    /* ═══════════════════════════════════════════
       NAVIGATION
    ═══════════════════════════════════════════ */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 2rem 4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      mix-blend-mode: difference;
    }

    .nav-back {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
      transition: opacity 0.3s;
    }

    .nav-back:hover {
      opacity: 0.6;
    }

    .nav-back-line {
      width: 40px;
      height: 1px;
      background: #fff;
      transition: width 0.3s var(--ease-out);
    }

    .nav-back:hover .nav-back-line {
      width: 60px;
    }

    .nav-logo {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
    }

    .nav-count {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.5);
    }

    /* ═══════════════════════════════════════════
       PROJECT HERO
    ═══════════════════════════════════════════ */
    .project-hero {
      min-height: 100vh;
      background: var(--bg-dark);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 4rem 6rem;
      position: relative;
      overflow: hidden;
    }

    .hero-number {
      position: absolute;
      top: 50%;
      right: 4rem;
      transform: translateY(-50%);
      font-size: clamp(15rem, 25vw, 35rem);
      font-weight: 300;
      line-height: 1;
      color: rgba(255,255,255,0.03);
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
    }

    .hero-label {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 2rem;
    }

    .hero-title-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 2rem;
    }

    .hero-bracket {
      font-size: clamp(4rem, 10vw, 10rem);
      font-weight: 300;
      color: rgba(255,255,255,0.15);
      line-height: 1;
      position: absolute;
    }

    .hero-bracket-left {
      left: -4rem;
    }

    .hero-bracket-right {
      right: 30%;
    }

    .hero-title {
      font-size: clamp(3rem, 8vw, 8rem);
      font-weight: 500;
      line-height: 1;
      letter-spacing: -0.04em;
      color: #fff;
      max-width: 70%;
    }

    .hero-meta {
      display: flex;
      gap: 4rem;
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .meta-label {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    .meta-value {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.7);
      font-weight: 400;
    }

    /* ═══════════════════════════════════════════
       DOCUMENT VIEWER SECTION
    ═══════════════════════════════════════════ */
    .document-section {
      background: var(--bg);
      padding: 6rem 4rem;
    }

    .document-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 3rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }

    .document-title-container {
      position: relative;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 120px;
    }

    .document-bracket {
      font-size: clamp(4rem, 8vw, 8rem);
      font-weight: 300;
      color: rgba(0,0,0,0.08);
      line-height: 1;
      position: absolute;
    }

    .document-bracket-left {
      left: 25%;
    }

    .document-bracket-right {
      right: 25%;
    }

    .document-title-text {
      font-size: clamp(2rem, 4vw, 4rem);
      font-weight: 500;
      letter-spacing: -0.02em;
      text-align: center;
    }

    .document-info {
      display: flex;
      justify-content: center;
      gap: 3rem;
      margin-bottom: 3rem;
    }

    .document-info-item {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-light);
    }

    .pdf-container {
      width: 100%;
      height: 85vh;
      background: #f5f5f5;
      border-radius: 4px;
      overflow: hidden;
    }

    .pdf-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ═══════════════════════════════════════════
       PROJECT DETAILS SECTION
    ═══════════════════════════════════════════ */
    .details-section {
      background: var(--bg);
      padding: 8rem 4rem;
    }

    .details-header {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 1rem;
      text-align: center;
    }

    .details-title-container {
      position: relative;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100px;
      margin-bottom: 4rem;
    }

    .details-bracket {
      font-size: clamp(3rem, 6vw, 6rem);
      font-weight: 300;
      color: rgba(0,0,0,0.08);
      line-height: 1;
      position: absolute;
    }

    .details-bracket-left {
      left: 25%;
    }

    .details-bracket-right {
      right: 25%;
    }

    .details-title-text {
      font-size: clamp(1.5rem, 3vw, 2.5rem);
      font-weight: 500;
      letter-spacing: -0.02em;
      text-align: center;
      max-width: 700px;
    }

    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .details-description {
      font-size: 1.1rem;
      line-height: 1.8;
      color: var(--text-light);
      font-weight: 300;
    }

    .details-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-top: 2rem;
    }

    .tag {
      padding: 0.5rem 1.2rem;
      border: 1px solid rgba(0,0,0,0.1);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-light);
    }

    .deliverables-title {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 1.5rem;
    }

    .deliverables-list {
      list-style: none;
    }

    .deliverables-list li {
      padding: 1rem 0;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      font-size: 0.95rem;
      color: var(--text);
      font-weight: 300;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .deliverables-list li::before {
      content: '';
      width: 20px;
      height: 1px;
      background: var(--dark);
      opacity: 0.3;
    }

    /* ═══════════════════════════════════════════
       NEXT PROJECT
    ═══════════════════════════════════════════ */
    .next-project {
      background: var(--bg-dark);
      padding: 8rem 4rem;
      text-decoration: none;
      display: block;
      position: relative;
      overflow: hidden;
    }

    .next-label {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 1rem;
      text-align: center;
    }

    .next-title-container {
      position: relative;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 120px;
    }

    .next-bracket {
      font-size: clamp(4rem, 8vw, 8rem);
      font-weight: 300;
      color: rgba(255,255,255,0.08);
      line-height: 1;
      position: absolute;
      transition: all 0.6s var(--ease-out);
    }

    .next-bracket-left {
      left: 30%;
    }

    .next-bracket-right {
      right: 30%;
    }

    .next-project:hover .next-bracket-left {
      left: 10%;
      color: rgba(255,255,255,0.15);
    }

    .next-project:hover .next-bracket-right {
      right: 10%;
      color: rgba(255,255,255,0.15);
    }

    .next-title-text {
      font-size: clamp(2rem, 5vw, 5rem);
      font-weight: 500;
      letter-spacing: -0.02em;
      color: #fff;
      transition: letter-spacing 0.6s var(--ease-out);
    }

    .next-project:hover .next-title-text {
      letter-spacing: 0.02em;
    }

    .next-arrow {
      display: flex;
      justify-content: center;
      margin-top: 2rem;
      font-size: 1.5rem;
      color: rgba(255,255,255,0.3);
      transition: transform 0.4s var(--ease-out), color 0.3s;
    }

    .next-project:hover .next-arrow {
      transform: translateY(10px);
      color: rgba(255,255,255,0.6);
    }

    /* ═══════════════════════════════════════════
       FOOTER
    ═══════════════════════════════════════════ */
    .footer {
      background: var(--bg-dark);
      padding: 3rem 4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .footer-copy {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.3);
    }

    .footer-links {
      display: flex;
      gap: 2rem;
    }

    .footer-link {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      transition: color 0.3s;
    }

    .footer-link:hover {
      color: #fff;
    }

    /* ═══════════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════════ */
    @media (max-width: 900px) {
      .nav {
        padding: 1.5rem 2rem;
      }

      .project-hero {
        padding: 0 2rem 4rem;
      }

      .hero-bracket-left {
        left: -2rem;
      }

      .hero-meta {
        flex-wrap: wrap;
        gap: 2rem;
      }

      .document-section,
      .details-section {
        padding: 4rem 2rem;
      }

      .details-grid {
        grid-template-columns: 1fr;
        gap: 3rem;
      }

      .next-project {
        padding: 5rem 2rem;
      }

      .footer {
        padding: 2rem;
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }

      .cursor, .cursor-follower {
        display: none;
      }

      body {
        cursor: auto;
      }
    }
  </style>
</head>

        imagesFolder: 'Camilo Novillo - Graphic Designer/ADs/Google_ADs_AnimSet/',
        imagePrefix: 'Google_ADs_AnimSet_page-',
        imageCount: 11,
        cover: 'Camilo Novillo - Graphic Designer/ADs/Google_ADs_AnimSet/Google_ADs_AnimSet_page-0002.jpg'
      },
      {
        id: 5,
        num: '05',
        label: 'Publicidad Digital · DealerNET',
        title: 'Storyboard META Ads',
        client: 'DealerNET',
        year: '2024',
        type: 'META Ads · Storyboarding',
        pages: '8 escenas',
        descTitle: 'La historia antes de la historia.',
        descBody: 'Guion visual completo para campañas publicitarias en el ecosistema META. El storyboard mapea cada fotograma, transición y mensaje de la campaña, sirviendo como puente entre el concepto creativo y la producción final.',
        tags: ['META Ads', 'Storyboard', 'Facebook', 'Instagram', 'Creative Strategy'],
        deliverables: ['Guion visual frame-by-frame', 'Especificaciones de animación', 'Copy y textos por escena', 'Timing y duración de planos', 'Variantes A/B de campaña'],
        pdf: 'Camilo Novillo - Graphic Designer/ADs/META_ADs_Storyboard/META_ADs_Storyboard.pdf',
        imagesFolder: 'Camilo Novillo - Graphic Designer/ADs/META_ADs_Storyboard/',
        imagePrefix: 'META_ADs_Storyboard_page-',
        imageCount: 8,
        cover: 'Camilo Novillo - Graphic Designer/ADs/META_ADs_Storyboard/META_ADs_Storyboard_page-0002.jpg'
      }
    ];

    // ═══════════════════════════════════════════════════════════
    // RESOLVE PROJECT
    // ═══════════════════════════════════════════════════════════
    const params = new URLSearchParams(window.location.search);
    const projectId = parseInt(params.get('id')) || 1;
    const project = PROJECTS.find(p => p.id === projectId) || PROJECTS[0];
    const nextProject = PROJECTS[projectId % PROJECTS.length];

    document.title = `${project.title} — Camilo Novillo`;

    // ═══════════════════════════════════════════════════════════
    // POPULATE CONTENT
    // ═══════════════════════════════════════════════════════════
    document.getElementById('hero-number').textContent = project.num;
    document.getElementById('hero-label').textContent = project.label;
    document.getElementById('hero-title').textContent = project.title;
    document.getElementById('nav-count').textContent = `${project.num} / 05`;

    // Meta info
    const metaEl = document.getElementById('hero-meta');
    [
      { label: 'Cliente', value: project.client },
      { label: 'Año', value: project.year },
      { label: 'Tipo', value: project.type }
    ].forEach(m => {
      metaEl.innerHTML += `
        <div class="meta-item">
          <span class="meta-label">${m.label}</span>
          <span class="meta-value">${m.value}</span>
        </div>
      `;
    });

    // Document section
    document.getElementById('doc-type').textContent = project.type;
    document.getElementById('doc-pages').textContent = project.pages;
    document.getElementById('pdf-iframe').src = project.pdf;

    // Details section
    document.getElementById('details-title').textContent = project.descTitle;
    document.getElementById('details-description').textContent = project.descBody;

    // Tags
    const tagsEl = document.getElementById('details-tags');
    project.tags.forEach(tag => {
      tagsEl.innerHTML += `<span class="tag">${tag}</span>`;
    });

    // Deliverables
    const delEl = document.getElementById('deliverables-list');
    project.deliverables.forEach(d => {
      delEl.innerHTML += `<li>${d}</li>`;
    });

    // Next project
    document.getElementById('next-title').textContent = nextProject.title;
    document.getElementById('next-project').href = `project.html?id=${nextProject.id}`;

    // ═══════════════════════════════════════════════════════════
    // LENIS SMOOTH SCROLL
    // ═══════════════════════════════════════════════════════════
    const lenis = new Lenis({
      duration: 1.2,
      easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
      direction: 'vertical',
      gestureDirection: 'vertical',
      smooth: true,
      smoothTouch: false,
      touchMultiplier: 2
    });

    function raf(time) {
      lenis.raf(time);
      requestAnimationFrame(raf);
    }
    requestAnimationFrame(raf);

    // Connect Lenis to GSAP ScrollTrigger
    lenis.on('scroll', ScrollTrigger.update);
    gsap.ticker.add((time) => {
      lenis.raf(time * 1000);
    });
    gsap.ticker.lagSmoothing(0);

    // ═══════════════════════════════════════════════════════════
    // CURSOR
    // ═══════════════════════════════════════════════════════════
    const cursor = document.querySelector('.cursor');
    const follower = document.querySelector('.cursor-follower');
    let mouseX = 0, mouseY = 0;
    let followerX = 0, followerY = 0;

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    function animateCursor() {
      followerX += (mouseX - followerX) * 0.1;
      followerY += (mouseY - followerY) * 0.1;

      cursor.style.left = mouseX + 'px';
      cursor.style.top = mouseY + 'px';
      follower.style.left = followerX + 'px';
      follower.style.top = followerY + 'px';

      requestAnimationFrame(animateCursor);
    }
    animateCursor();

    document.querySelectorAll('a, button').forEach(el => {
      el.addEventListener('mouseenter', () => follower.classList.add('hover'));
      el.addEventListener('mouseleave', () => follower.classList.remove('hover'));
    });

    // ═══════════════════════════════════════════════════════════
    // PRELOADER
    // ═══════════════════════════════════════════════════════════
    const preloader = document.querySelector('.preloader');
    const progressBar = document.querySelector('.preloader-progress');
    
    gsap.to(progressBar, {
      width: '100%',
      duration: 1,
      ease: 'power2.inOut',
      onComplete: () => {
        gsap.to(preloader, {
          yPercent: -100,
          duration: 0.8,
          ease: 'power3.inOut',
          onComplete: () => {
            preloader.style.display = 'none';
            animateHero();
          }
        });
      }
    });

    // ═══════════════════════════════════════════════════════════
    // HERO ANIMATIONS
    // ═══════════════════════════════════════════════════════════
    function animateHero() {
      const heroLabel = document.querySelector('.hero-label');
      const heroTitle = document.querySelector('.hero-title');
      const heroBracketLeft = document.querySelector('.hero-bracket-left');
      const heroBracketRight = document.querySelector('.hero-bracket-right');
      const heroMeta = document.querySelector('.hero-meta');
      const heroNumber = document.querySelector('.hero-number');

      gsap.set([heroLabel, heroTitle, heroMeta], { opacity: 0, y: 40 });
      gsap.set(heroBracketLeft, { x: 50, opacity: 0 });
      gsap.set(heroBracketRight, { x: -50, opacity: 0 });
      gsap.set(heroNumber, { opacity: 0, scale: 0.9 });

      const tl = gsap.timeline();

      tl.to(heroNumber, { opacity: 1, scale: 1, duration: 1.2, ease: 'power2.out' }, 0)
        .to(heroLabel, { opacity: 1, y: 0, duration: 0.8, ease: 'power2.out' }, 0.3)
        .to(heroBracketLeft, { x: 0, opacity: 0.15, duration: 1, ease: 'power2.out' }, 0.4)
        .to(heroBracketRight, { x: 0, opacity: 0.15, duration: 1, ease: 'power2.out' }, 0.4)
        .to(heroTitle, { opacity: 1, y: 0, duration: 0.8, ease: 'power2.out' }, 0.5)
        .to(heroMeta, { opacity: 1, y: 0, duration: 0.8, ease: 'power2.out' }, 0.7);
    }

    // ═══════════════════════════════════════════════════════════
    // SCROLL ANIMATIONS
    // ═══════════════════════════════════════════════════════════
    gsap.registerPlugin(ScrollTrigger);

    // Document section brackets
    const docSection = document.querySelector('.document-section');
    const docBracketLeft = document.querySelector('.document-bracket-left');
    const docBracketRight = document.querySelector('.document-bracket-right');
    const docTitle = document.querySelector('.document-title-text');

    gsap.set(docBracketLeft, { left: '35%', opacity: 0 });
    gsap.set(docBracketRight, { right: '35%', opacity: 0 });
    gsap.set(docTitle, { opacity: 0, y: 30 });

    gsap.timeline({
      scrollTrigger: {
        trigger: docSection,
        start: 'top 70%',
        end: 'top 20%',
        scrub: 1
      }
    })
    .to(docBracketLeft, { left: '5%', opacity: 0.15, duration: 1 }, 0)
    .to(docBracketRight, { right: '5%', opacity: 0.15, duration: 1 }, 0)
    .to(docTitle, { opacity: 1, y: 0, duration: 0.8 }, 0.1);

    // Details section brackets
    const detailsSection = document.querySelector('.details-section');
    const detailsBracketLeft = document.querySelector('.details-bracket-left');
    const detailsBracketRight = document.querySelector('.details-bracket-right');
    const detailsTitle = document.querySelector('.details-title-text');
    const detailsGrid = document.querySelector('.details-grid');

    gsap.set(detailsBracketLeft, { left: '35%', opacity: 0 });
    gsap.set(detailsBracketRight, { right: '35%', opacity: 0 });
    gsap.set(detailsTitle, { opacity: 0, y: 30 });
    gsap.set(detailsGrid, { opacity: 0, y: 40 });

    gsap.timeline({
      scrollTrigger: {
        trigger: detailsSection,
        start: 'top 70%',
        end: 'top 20%',
        scrub: 1
      }
    })
    .to(detailsBracketLeft, { left: '5%', opacity: 0.15, duration: 1 }, 0)
    .to(detailsBracketRight, { right: '5%', opacity: 0.15, duration: 1 }, 0)
    .to(detailsTitle, { opacity: 1, y: 0, duration: 0.8 }, 0.1)
    .to(detailsGrid, { opacity: 1, y: 0, duration: 0.8 }, 0.3);

    // ═══════════════════════════════════════════════════════════
    // NAVIGATION
    // ═══════════════════════════════════════════════════════════
    document.getElementById('back-link').addEventListener('click', (e) => {
      e.preventDefault();
      gsap.to('.preloader', {
        display: 'flex',
        yPercent: 0,
        duration: 0,
        onComplete: () => {
          gsap.fromTo('.preloader', { yPercent: 100 }, {
            yPercent: 0,
            duration: 0.6,
            ease: 'power3.inOut',
            onComplete: () => {
              window.location.href = 'index.html';
            }
          });
        }
      });
    });

    document.getElementById('next-project').addEventListener('click', (e) => {
      e.preventDefault();
      const href = e.currentTarget.href;
      gsap.to('.preloader', {
        display: 'flex',
        yPercent: 0,
        duration: 0,
        onComplete: () => {
          gsap.fromTo('.preloader', { yPercent: 100 }, {
            yPercent: 0,
            duration: 0.6,
            ease: 'power3.inOut',
            onComplete: () => {
              window.location.href = href;
            }
          });
        }
      });
    });
  </script>
</body>

</html>
